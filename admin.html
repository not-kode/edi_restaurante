<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Restaurante da Edi</title>
    <meta
      name="description"
      content="Painel simples para atualizar as marmitas do Restaurante da Edi."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="site-admin">
    <div class="page-shell">
      <main class="menu-page admin-page">
        <section id="admin-auth-section" class="admin-auth-shell">
          <div class="admin-auth-card">
            <h1>Painel Administrativo do Restaurante</h1>

            <form id="admin-auth-form" class="admin-auth">
              <label class="toolbar-field">
                <span>Senha</span>
                <input id="admin-password" type="password" placeholder="Digite sua senha" />
              </label>
              <button class="cta-panel__button admin-auth__button" type="submit">Entrar</button>
            </form>
          </div>
        </section>

        <section id="admin-panel" class="admin-panel hidden">
          <section class="admin-card">
            <div class="section-header">
              <div>
                <p class="section-header__eyebrow">Admin</p>
                <h2>Gerenciar marmitas</h2>
                <p class="section-header__note">Painel interno para atualizar o cardápio do restaurante.</p>
              </div>
              <div class="admin-header-actions">
                <button id="open-drawer-btn" class="cta-panel__button" type="button">+ Adicionar marmita</button>
                <a class="section-header__admin-link" href="./index.html">Ver cardápio</a>
              </div>
            </div>

            <div class="admin-toolbar">
              <button id="refresh-admin" class="admin-secondary-button" type="button">
                Atualizar lista
              </button>
              <span id="admin-status" class="menu-status" aria-live="polite"></span>
            </div>

            <div class="admin-table-wrapper">
              <table class="admin-table" id="admin-table">
                <thead>
                  <tr>
                    <th>Foto</th>
                    <th>Nome</th>
                    <th>Dia</th>
                    <th>Preço</th>
                    <th>Destaque</th>
                    <th>Ativo</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="admin-list"></tbody>
              </table>
            </div>
        </section>

        <div class="admin-drawer-overlay hidden" id="admin-drawer-overlay"></div>
        <div class="admin-drawer hidden" id="admin-drawer">
          <div class="admin-drawer__header">
            <h2 id="form-title">Nova marmita</h2>
            <button class="admin-drawer__close" id="admin-drawer-close" type="button">✕</button>
          </div>
          <div class="admin-drawer__body">
            <form id="dish-form" class="admin-form">
              <input id="dish-id" type="hidden" />

              <label class="toolbar-field">
                <span>Nome</span>
                <input id="dish-name" type="text" required />
              </label>

              <label class="toolbar-field">
                <span>Descrição</span>
                <textarea id="dish-description" rows="3"></textarea>
              </label>

              <div class="admin-form__row">
                <label class="toolbar-field">
                  <span>Preço</span>
                  <input id="dish-price" type="number" min="0" step="0.01" required />
                </label>
                <label class="toolbar-field">
                  <span>Preço promocional</span>
                  <input id="dish-sale-price" type="number" min="0" step="0.01" />
                </label>
              </div>

              <div class="admin-form__row">
                <label class="toolbar-field">
                  <span>Dia da semana</span>
                  <select id="dish-day" required>
                    <option value="">Selecione</option>
                    <option value="Segunda">Segunda</option>
                    <option value="Terça">Terça</option>
                    <option value="Quarta">Quarta</option>
                    <option value="Quinta">Quinta</option>
                    <option value="Sexta">Sexta</option>
                    <option value="Sábado">Sábado</option>
                    <option value="Diário">Diário (todos os dias)</option>
                  </select>
                </label>
                <label class="toolbar-field">
                  <span>Ordem</span>
                  <input id="dish-order" type="number" min="0" step="1" value="0" />
                </label>
              </div>

              <div class="admin-upload" id="photo-upload-zone">
                <input id="dish-photo-file" type="file" accept="image/*" hidden />
                <div class="admin-upload__prompt">
                  <p>Arraste uma foto aqui ou <button type="button" class="admin-upload__link" id="photo-browse-btn">escolha do computador</button></p>
                  <p class="admin-upload__hint">JPG, PNG ou WEBP — máx. 5 MB</p>
                </div>
                <div class="admin-upload__progress" id="photo-upload-progress">
                  <div class="admin-upload__bar" id="photo-upload-bar"></div>
                </div>
              </div>

              <input id="dish-photo-url" type="hidden" />
              <div class="admin-preview">
                <img id="dish-photo-preview" src="" alt="Pré-visualização da foto" />
              </div>

              <div class="admin-checkboxes">
                <label class="admin-checkbox">
                  <input id="dish-active" type="checkbox" checked />
                  <span>Ativo</span>
                </label>
                <label class="admin-checkbox">
                  <input id="dish-highlight" type="checkbox" />
                  <span>Destaque do dia</span>
                </label>
                <label class="admin-checkbox">
                  <input id="dish-sale" type="checkbox" />
                  <span>Em promoção</span>
                </label>
                <label class="admin-checkbox">
                  <input id="dish-diario" type="checkbox" />
                  <span>Prato diário</span>
                </label>
              </div>

              <div class="admin-actions">
                <button id="reset-form" class="admin-secondary-button" type="button">Limpar</button>
                <button class="cta-panel__button" type="submit">Salvar marmita</button>
              </div>
            </form>
          </div>
        </div>
        </section>
      </main>
    </div>

    <script src="./admin.js"></script>
  </body>
</html>
